[job]
dump_folder = "./outputs"
description = "Flux.2 debug model"
custom_config_module = "torchtitan.models.flux2.job_config"

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
enable_wandb = false

[model]
name = "flux2"
flavor = "flux.2-debug"

[optimizer]
name = "AdamW"
lr = 1e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 5
decay_ratio = 0.0

[training]
steps = 10
local_batch_size = 2
max_norm = 1.0
dataset = "cc12m-test"
img_size = 256
guidance = 4.0
test_mode = true

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1

[activation_checkpoint]
mode = "full"

[checkpoint]
enable = false

[validation]
enable = false
